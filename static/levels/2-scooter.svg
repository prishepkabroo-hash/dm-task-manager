<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128" width="128" height="128">
  <defs>
    <filter id="neon2" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <linearGradient id="grad2" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#a78bfa"/><stop offset="100%" stop-color="#7c3aed"/>
    </linearGradient>
  </defs>
  <!-- Person on kick scooter facing RIGHT — neon violet -->
  <g filter="url(#neon2)" transform="translate(64,64)">
    <!-- Wheels -->
    <circle cx="-20" cy="28" r="8" fill="none" stroke="url(#grad2)" stroke-width="2" opacity="0.8"/>
    <circle cx="20" cy="28" r="8" fill="none" stroke="url(#grad2)" stroke-width="2" opacity="0.8"/>
    <!-- Wheel hubs -->
    <circle cx="-20" cy="28" r="2" fill="#7c3aed" opacity="0.6"/>
    <circle cx="20" cy="28" r="2" fill="#7c3aed" opacity="0.6"/>
    <!-- Deck -->
    <line x1="-20" y1="22" x2="20" y2="22" stroke="url(#grad2)" stroke-width="3" stroke-linecap="round"/>
    <!-- Handlebar post -->
    <line x1="18" y1="22" x2="22" y2="-10" stroke="url(#grad2)" stroke-width="2.5" stroke-linecap="round"/>
    <!-- Handlebar -->
    <line x1="16" y1="-10" x2="28" y2="-12" stroke="url(#grad2)" stroke-width="2.5" stroke-linecap="round"/>
    <!-- Rider body -->
    <circle cx="4" cy="-22" r="8" fill="none" stroke="url(#grad2)" stroke-width="2.5" opacity="0.9"/>
    <!-- Torso -->
    <line x1="4" y1="-14" x2="0" y2="8" stroke="url(#grad2)" stroke-width="2.5" stroke-linecap="round"/>
    <!-- Arms to handlebar -->
    <path d="M4,-10 L20,-10" fill="none" stroke="url(#grad2)" stroke-width="2" stroke-linecap="round"/>
    <!-- Standing leg -->
    <path d="M0,8 L-4,22" fill="none" stroke="url(#grad2)" stroke-width="2.5" stroke-linecap="round"/>
    <!-- Push leg back -->
    <path d="M0,8 L-16,18" fill="none" stroke="url(#grad2)" stroke-width="2.5" stroke-linecap="round"/>
    <!-- Speed lines -->
    <line x1="-34" y1="-16" x2="-46" y2="-16" stroke="#a78bfa" stroke-width="1.5" opacity="0.4" stroke-linecap="round"/>
    <line x1="-32" y1="-4" x2="-48" y2="-4" stroke="#a78bfa" stroke-width="1" opacity="0.3" stroke-linecap="round"/>
    <line x1="-34" y1="8" x2="-44" y2="8" stroke="#a78bfa" stroke-width="1.5" opacity="0.35" stroke-linecap="round"/>
  </g>
</svg>