<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128" width="128" height="128">
  <defs>
    <filter id="neon7" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="4" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <linearGradient id="grad7" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#fbbf24"/><stop offset="100%" stop-color="#f59e0b"/>
    </linearGradient>
  </defs>
  <!-- F2 race car facing RIGHT — neon amber/gold -->
  <g filter="url(#neon7)" transform="translate(64,64)">
    <!-- Rear wing (bigger than F3) -->
    <path d="M-34,-10 L-28,-10 L-26,-16 L-36,-16 Z" fill="none" stroke="url(#grad7)" stroke-width="2" opacity="0.8"/>
    <line x1="-31" y1="-10" x2="-31" y2="0" stroke="url(#grad7)" stroke-width="2" opacity="0.6"/>
    <!-- Shark fin -->
    <path d="M-20,-4 L-10,-12 L0,-8" fill="none" stroke="url(#grad7)" stroke-width="1.5" opacity="0.4"/>
    <!-- Body -->
    <path d="M-28,2 L-22,-4 L0,-8 L26,-6 L38,-2 L42,2 L40,6 L-30,6 Z" fill="none" stroke="url(#grad7)" stroke-width="2.5" stroke-linejoin="round"/>
    <!-- Nose -->
    <path d="M38,-2 L48,0 L40,4" fill="none" stroke="url(#grad7)" stroke-width="2" stroke-linejoin="round"/>
    <!-- Cockpit + halo -->
    <path d="M-2,-6 L6,-12 L14,-8" fill="none" stroke="url(#grad7)" stroke-width="1.5" opacity="0.6"/>
    <path d="M0,-6 L6,-14 L14,-8" fill="none" stroke="#fbbf24" stroke-width="2" opacity="0.4"/>
    <!-- Driver -->
    <ellipse cx="6" cy="-10" rx="5" ry="4.5" fill="none" stroke="#fbbf24" stroke-width="2" opacity="0.85"/>
    <!-- Rear wheels -->
    <ellipse cx="-24" cy="10" rx="7" ry="9" fill="none" stroke="url(#grad7)" stroke-width="2.5" opacity="0.8"/>
    <ellipse cx="-24" cy="10" rx="2" ry="2" fill="#f59e0b" opacity="0.3"/>
    <!-- Front wheels -->
    <ellipse cx="32" cy="10" rx="5.5" ry="7.5" fill="none" stroke="url(#grad7)" stroke-width="2.5" opacity="0.8"/>
    <!-- Front wing endplates -->
    <path d="M40,4 L48,6 L50,2" fill="none" stroke="url(#grad7)" stroke-width="2" opacity="0.6"/>
    <!-- DRS flap -->
    <path d="M-34,-16 L-26,-16" fill="none" stroke="#fbbf24" stroke-width="1" opacity="0.5" stroke-dasharray="2 2"/>
    <!-- Number -->
    <text x="-12" y="4" font-size="8" fill="#fbbf24" opacity="0.5" font-family="monospace" font-weight="bold">F2</text>
    <!-- Speed lines (more intense) -->
    <line x1="-42" y1="-8" x2="-60" y2="-8" stroke="#fbbf24" stroke-width="2" opacity="0.5" stroke-linecap="round"/>
    <line x1="-40" y1="0" x2="-62" y2="0" stroke="#fbbf24" stroke-width="2" opacity="0.45" stroke-linecap="round"/>
    <line x1="-38" y1="8" x2="-58" y2="8" stroke="#fbbf24" stroke-width="1.5" opacity="0.4" stroke-linecap="round"/>
    <line x1="-40" y1="16" x2="-56" y2="16" stroke="#fbbf24" stroke-width="1.5" opacity="0.35" stroke-linecap="round"/>
    <line x1="-42" y1="24" x2="-54" y2="24" stroke="#fbbf24" stroke-width="1" opacity="0.25" stroke-linecap="round"/>
  </g>
</svg>