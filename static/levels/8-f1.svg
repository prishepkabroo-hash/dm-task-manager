<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128" width="128" height="128">
  <defs>
    <filter id="neon8" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="4" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="blur"/><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <linearGradient id="grad8" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#f87171"/><stop offset="100%" stop-color="#dc2626"/>
    </linearGradient>
  </defs>
  <!-- F1 car facing RIGHT — neon red, intense glow -->
  <g filter="url(#neon8)" transform="translate(64,64)">
    <!-- Rear wing (large, complex) -->
    <path d="M-36,-12 L-26,-12 L-24,-18 L-38,-18 Z" fill="none" stroke="url(#grad8)" stroke-width="2.5" opacity="0.85"/>
    <line x1="-32" y1="-12" x2="-32" y2="-2" stroke="url(#grad8)" stroke-width="2" opacity="0.6"/>
    <line x1="-28" y1="-12" x2="-28" y2="0" stroke="url(#grad8)" stroke-width="1.5" opacity="0.5"/>
    <!-- Engine intake / shark fin -->
    <path d="M-18,-4 L-8,-16 L4,-10" fill="none" stroke="url(#grad8)" stroke-width="1.5" opacity="0.45"/>
    <!-- Body — sleek F1 shape -->
    <path d="M-30,2 L-24,-4 L0,-10 L28,-6 L40,-2 L44,2 L42,6 L-32,6 Z" fill="none" stroke="url(#grad8)" stroke-width="2.5" stroke-linejoin="round"/>
    <!-- Sidepod inlets -->
    <path d="M-8,-4 L-4,0 L4,0 L8,-4" fill="none" stroke="url(#grad8)" stroke-width="1" opacity="0.4"/>
    <!-- Nose cone (long, narrow) -->
    <path d="M40,-2 L52,-1 L42,4" fill="none" stroke="url(#grad8)" stroke-width="2" stroke-linejoin="round"/>
    <!-- Cockpit + halo device -->
    <path d="M2,-8 L8,-14 L16,-10" fill="none" stroke="url(#grad8)" stroke-width="2" opacity="0.6"/>
    <path d="M4,-8 L8,-16 L16,-10" fill="none" stroke="#f87171" stroke-width="2.5" opacity="0.5"/>
    <!-- Driver helmet with visor -->
    <ellipse cx="8" cy="-12" rx="5.5" ry="5" fill="none" stroke="#f87171" stroke-width="2.5" opacity="0.9"/>
    <path d="M11,-13 L14,-12 L13,-10" fill="none" stroke="#dc2626" stroke-width="1.5" opacity="0.6"/>
    <!-- Rear wheels (wide) -->
    <ellipse cx="-26" cy="10" rx="8" ry="10" fill="none" stroke="url(#grad8)" stroke-width="2.5" opacity="0.85"/>
    <ellipse cx="-26" cy="10" rx="2.5" ry="2.5" fill="#dc2626" opacity="0.4"/>
    <!-- Front wheels -->
    <ellipse cx="34" cy="10" rx="6" ry="8" fill="none" stroke="url(#grad8)" stroke-width="2.5" opacity="0.85"/>
    <!-- Front wing (complex) -->
    <path d="M42,4 L50,4 L52,2 L54,6 L50,8 L42,6" fill="none" stroke="url(#grad8)" stroke-width="2" opacity="0.7"/>
    <!-- Number -->
    <text x="-14" y="4" font-size="8" fill="#f87171" opacity="0.5" font-family="monospace" font-weight="bold">F1</text>
    <!-- Intense speed lines -->
    <line x1="-44" y1="-10" x2="-62" y2="-10" stroke="#f87171" stroke-width="2.5" opacity="0.5" stroke-linecap="round"/>
    <line x1="-42" y1="-2" x2="-64" y2="-2" stroke="#f87171" stroke-width="2" opacity="0.5" stroke-linecap="round"/>
    <line x1="-40" y1="6" x2="-62" y2="6" stroke="#f87171" stroke-width="2" opacity="0.45" stroke-linecap="round"/>
    <line x1="-42" y1="14" x2="-58" y2="14" stroke="#f87171" stroke-width="1.5" opacity="0.4" stroke-linecap="round"/>
    <line x1="-44" y1="22" x2="-56" y2="22" stroke="#f87171" stroke-width="1.5" opacity="0.35" stroke-linecap="round"/>
    <line x1="-40" y1="28" x2="-52" y2="28" stroke="#f87171" stroke-width="1" opacity="0.25" stroke-linecap="round"/>
    <!-- Exhaust heat shimmer -->
    <circle cx="-38" cy="4" r="3" fill="none" stroke="#f87171" stroke-width="0.8" opacity="0.2"/>
    <circle cx="-44" cy="2" r="4" fill="none" stroke="#f87171" stroke-width="0.6" opacity="0.15"/>
  </g>
</svg>