<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128" width="128" height="128">
  <defs>
    <filter id="neon4" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <linearGradient id="grad4" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#f87171"/><stop offset="100%" stop-color="#ef4444"/>
    </linearGradient>
  </defs>
  <!-- Motorcycle with rider facing RIGHT — neon red -->
  <g filter="url(#neon4)" transform="translate(64,64)">
    <!-- Rear wheel -->
    <circle cx="-18" cy="22" r="12" fill="none" stroke="url(#grad4)" stroke-width="2" opacity="0.8"/>
    <circle cx="-18" cy="22" r="3" fill="#ef4444" opacity="0.4"/>
    <!-- Front wheel -->
    <circle cx="24" cy="22" r="12" fill="none" stroke="url(#grad4)" stroke-width="2" opacity="0.8"/>
    <circle cx="24" cy="22" r="3" fill="#ef4444" opacity="0.4"/>
    <!-- Frame -->
    <path d="M-18,14 L-4,0 L20,10 L24,14" fill="none" stroke="url(#grad4)" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
    <path d="M-18,14 L0,10 L20,10" fill="none" stroke="url(#grad4)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
    <!-- Engine block -->
    <rect x="-8" y="6" width="14" height="8" rx="2" fill="none" stroke="url(#grad4)" stroke-width="1.5" opacity="0.6"/>
    <!-- Handlebars -->
    <path d="M20,10 L26,0 L30,-2" fill="none" stroke="url(#grad4)" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
    <!-- Rider helmet -->
    <ellipse cx="6" cy="-18" rx="8" ry="7" fill="none" stroke="url(#grad4)" stroke-width="2.5" opacity="0.9"/>
    <!-- Visor -->
    <path d="M8,-20 L14,-18 L12,-16" fill="none" stroke="#ef4444" stroke-width="1.5" opacity="0.6"/>
    <!-- Rider body leaning -->
    <path d="M4,-11 L0,2" fill="none" stroke="url(#grad4)" stroke-width="2.5" stroke-linecap="round"/>
    <!-- Arms to handlebars -->
    <path d="M6,-8 L24,0" fill="none" stroke="url(#grad4)" stroke-width="2" stroke-linecap="round"/>
    <!-- Legs -->
    <path d="M0,2 L-6,14" fill="none" stroke="url(#grad4)" stroke-width="2" stroke-linecap="round"/>
    <!-- Headlight beam -->
    <path d="M30,-2 L42,-4 L40,2 Z" fill="#ef4444" opacity="0.15"/>
    <!-- Speed lines -->
    <line x1="-38" y1="-10" x2="-50" y2="-10" stroke="#f87171" stroke-width="2" opacity="0.4" stroke-linecap="round"/>
    <line x1="-36" y1="2" x2="-52" y2="2" stroke="#f87171" stroke-width="1.5" opacity="0.35" stroke-linecap="round"/>
    <line x1="-34" y1="14" x2="-48" y2="14" stroke="#f87171" stroke-width="1" opacity="0.3" stroke-linecap="round"/>
    <!-- Exhaust -->
    <circle cx="-32" cy="18" r="3" fill="none" stroke="#f87171" stroke-width="1" opacity="0.2"/>
    <circle cx="-38" cy="16" r="4" fill="none" stroke="#f87171" stroke-width="0.8" opacity="0.15"/>
  </g>
</svg>