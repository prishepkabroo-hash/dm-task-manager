<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 140" width="128" height="140">
  <defs>
    <filter id="neon9" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="4.5" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="blur"/><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <linearGradient id="grad9" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#fde047"/><stop offset="50%" stop-color="#fbbf24"/><stop offset="100%" stop-color="#f59e0b"/>
    </linearGradient>
    <linearGradient id="crown9" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#fde047"/><stop offset="100%" stop-color="#f59e0b"/>
    </linearGradient>
  </defs>
  <!-- CHAMPION F1 car facing RIGHT — neon GOLD with crown -->
  <g filter="url(#neon9)" transform="translate(64,76)">
    <!-- FLOATING CROWN above car -->
    <g transform="translate(8,-42)">
      <path d="M-12,0 L-8,-12 L-2,-4 L4,-14 L10,-4 L16,-12 L20,0 Z" fill="none" stroke="url(#crown9)" stroke-width="2.5" stroke-linejoin="round"/>
      <line x1="-12,0" y1="0" x2="20" y2="0" stroke="url(#crown9)" stroke-width="2"/>
      <!-- Jewels -->
      <circle cx="4" cy="-8" r="2" fill="#fde047" opacity="0.7"/>
      <circle cx="-6" cy="-4" r="1.5" fill="#fbbf24" opacity="0.6"/>
      <circle cx="14" cy="-4" r="1.5" fill="#fbbf24" opacity="0.6"/>
    </g>
    <!-- Rear wing (massive) -->
    <path d="M-36,-12 L-24,-12 L-22,-20 L-38,-20 Z" fill="none" stroke="url(#grad9)" stroke-width="2.5" opacity="0.9"/>
    <line x1="-32" y1="-12" x2="-32" y2="-2" stroke="url(#grad9)" stroke-width="2" opacity="0.7"/>
    <line x1="-28" y1="-12" x2="-28" y2="0" stroke="url(#grad9)" stroke-width="1.5" opacity="0.6"/>
    <!-- Engine cover / shark fin -->
    <path d="M-18,-4 L-6,-18 L6,-12" fill="none" stroke="url(#grad9)" stroke-width="1.5" opacity="0.5"/>
    <!-- Body -->
    <path d="M-30,2 L-24,-4 L0,-10 L28,-6 L40,-2 L44,2 L42,6 L-32,6 Z" fill="none" stroke="url(#grad9)" stroke-width="2.5" stroke-linejoin="round"/>
    <!-- Sidepods -->
    <path d="M-8,-4 L-4,0 L4,0 L8,-4" fill="none" stroke="url(#grad9)" stroke-width="1" opacity="0.5"/>
    <!-- Nose -->
    <path d="M40,-2 L52,-1 L42,4" fill="none" stroke="url(#grad9)" stroke-width="2.5" stroke-linejoin="round"/>
    <!-- Halo -->
    <path d="M4,-8 L8,-18 L16,-10" fill="none" stroke="#fde047" stroke-width="2.5" opacity="0.6"/>
    <!-- Driver helmet (gold visor) -->
    <ellipse cx="8" cy="-12" rx="6" ry="5" fill="none" stroke="#fde047" stroke-width="2.5" opacity="0.95"/>
    <path d="M12,-14 L16,-12 L14,-10" fill="#fbbf24" opacity="0.4"/>
    <!-- Rear wheels -->
    <ellipse cx="-26" cy="10" rx="8" ry="10" fill="none" stroke="url(#grad9)" stroke-width="2.5" opacity="0.9"/>
    <ellipse cx="-26" cy="10" rx="3" ry="3" fill="#f59e0b" opacity="0.4"/>
    <!-- Front wheels -->
    <ellipse cx="34" cy="10" rx="6" ry="8" fill="none" stroke="url(#grad9)" stroke-width="2.5" opacity="0.9"/>
    <!-- Front wing -->
    <path d="M42,4 L50,4 L52,2 L54,6 L50,8 L42,6" fill="none" stroke="url(#grad9)" stroke-width="2" opacity="0.8"/>
    <!-- Stars / number 1 -->
    <text x="-12" y="4" font-size="9" fill="#fde047" opacity="0.6" font-family="monospace" font-weight="bold">#1</text>
    <!-- Massive speed lines -->
    <line x1="-44" y1="-12" x2="-64" y2="-12" stroke="#fde047" stroke-width="2.5" opacity="0.55" stroke-linecap="round"/>
    <line x1="-42" y1="-4" x2="-66" y2="-4" stroke="#fbbf24" stroke-width="2.5" opacity="0.5" stroke-linecap="round"/>
    <line x1="-40" y1="4" x2="-64" y2="4" stroke="#fde047" stroke-width="2" opacity="0.5" stroke-linecap="round"/>
    <line x1="-42" y1="12" x2="-62" y2="12" stroke="#fbbf24" stroke-width="2" opacity="0.45" stroke-linecap="round"/>
    <line x1="-44" y1="20" x2="-60" y2="20" stroke="#fde047" stroke-width="1.5" opacity="0.4" stroke-linecap="round"/>
    <line x1="-40" y1="26" x2="-56" y2="26" stroke="#fbbf24" stroke-width="1.5" opacity="0.35" stroke-linecap="round"/>
    <line x1="-42" y1="32" x2="-54" y2="32" stroke="#fde047" stroke-width="1" opacity="0.25" stroke-linecap="round"/>
    <!-- Victory sparks -->
    <circle cx="50" cy="-10" r="2" fill="#fde047" opacity="0.6"/>
    <circle cx="46" cy="-16" r="1.5" fill="#fbbf24" opacity="0.5"/>
    <circle cx="54" cy="-4" r="1.5" fill="#fde047" opacity="0.4"/>
    <circle cx="-40" cy="-16" r="1.5" fill="#fbbf24" opacity="0.3"/>
    <!-- Exhaust fire -->
    <path d="M-34,2 L-42,0 L-38,4 L-46,2 L-40,6" fill="none" stroke="#f59e0b" stroke-width="1.5" opacity="0.4" stroke-linecap="round"/>
  </g>
</svg>