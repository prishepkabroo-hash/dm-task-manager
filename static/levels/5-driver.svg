<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128" width="128" height="128">
  <defs>
    <filter id="neon5" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <linearGradient id="grad5" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#60a5fa"/><stop offset="100%" stop-color="#3b82f6"/>
    </linearGradient>
  </defs>
  <!-- Sports car with driver facing RIGHT — neon blue -->
  <g filter="url(#neon5)" transform="translate(64,64)">
    <!-- Car body -->
    <path d="M-32,8 L-28,-4 L-12,-12 L12,-12 L28,-4 L34,4 L36,10 L36,16 L-34,16 L-34,10 Z" fill="none" stroke="url(#grad5)" stroke-width="2.5" stroke-linejoin="round"/>
    <!-- Windshield -->
    <path d="M-8,-10 L0,-10 L10,-10 L18,-4" fill="none" stroke="url(#grad5)" stroke-width="1.5" opacity="0.6"/>
    <!-- Roof line -->
    <path d="M-12,-12 L-4,-16 L8,-16 L12,-12" fill="none" stroke="url(#grad5)" stroke-width="2" stroke-linejoin="round"/>
    <!-- Driver head visible -->
    <circle cx="2" cy="-14" r="4" fill="none" stroke="#60a5fa" stroke-width="1.5" opacity="0.7"/>
    <!-- Rear wheel -->
    <circle cx="-20" cy="18" r="8" fill="none" stroke="url(#grad5)" stroke-width="2" opacity="0.8"/>
    <circle cx="-20" cy="18" r="3" fill="#3b82f6" opacity="0.3"/>
    <!-- Front wheel -->
    <circle cx="22" cy="18" r="8" fill="none" stroke="url(#grad5)" stroke-width="2" opacity="0.8"/>
    <circle cx="22" cy="18" r="3" fill="#3b82f6" opacity="0.3"/>
    <!-- Headlights -->
    <circle cx="35" cy="6" r="3" fill="#60a5fa" opacity="0.5"/>
    <!-- Headlight beam -->
    <path d="M38,4 L52,0 L50,10 Z" fill="#3b82f6" opacity="0.1"/>
    <!-- Taillights -->
    <circle cx="-33" cy="8" r="2" fill="#ef4444" opacity="0.5"/>
    <!-- Door line -->
    <line x1="0" y1="-10" x2="0" y2="14" stroke="url(#grad5)" stroke-width="1" opacity="0.3"/>
    <!-- Speed lines -->
    <line x1="-44" y1="-6" x2="-56" y2="-6" stroke="#60a5fa" stroke-width="2" opacity="0.4" stroke-linecap="round"/>
    <line x1="-42" y1="4" x2="-58" y2="4" stroke="#60a5fa" stroke-width="1.5" opacity="0.35" stroke-linecap="round"/>
    <line x1="-44" y1="14" x2="-54" y2="14" stroke="#60a5fa" stroke-width="1" opacity="0.3" stroke-linecap="round"/>
    <!-- Ground reflection -->
    <ellipse cx="0" cy="30" rx="30" ry="3" fill="#3b82f6" opacity="0.1"/>
  </g>
</svg>