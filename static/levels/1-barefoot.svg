<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128" width="128" height="128">
  <defs>
    <filter id="neon1" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <linearGradient id="grad1" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#c084fc"/><stop offset="100%" stop-color="#a855f7"/>
    </linearGradient>
  </defs>
  <!-- Running person facing RIGHT — neon purple -->
  <g filter="url(#neon1)" transform="translate(64,64)">
    <!-- Body -->
    <circle cx="8" cy="-38" r="9" fill="none" stroke="url(#grad1)" stroke-width="2.5" opacity="0.9"/>
    <!-- Torso leaning forward -->
    <line x1="6" y1="-29" x2="-2" y2="-8" stroke="url(#grad1)" stroke-width="3" stroke-linecap="round"/>
    <!-- Front arm reaching -->
    <path d="M4,-24 L18,-18 L22,-26" fill="none" stroke="url(#grad1)" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
    <!-- Back arm -->
    <path d="M0,-22 L-14,-16 L-10,-24" fill="none" stroke="url(#grad1)" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
    <!-- Front leg extended -->
    <path d="M-2,-8 L16,10 L24,8" fill="none" stroke="url(#grad1)" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>
    <!-- Back leg pushing off -->
    <path d="M-2,-8 L-18,12 L-24,22" fill="none" stroke="url(#grad1)" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>
    <!-- Motion lines behind -->
    <line x1="-30" y1="-20" x2="-42" y2="-20" stroke="#c084fc" stroke-width="1.5" opacity="0.4" stroke-linecap="round"/>
    <line x1="-28" y1="-10" x2="-44" y2="-10" stroke="#c084fc" stroke-width="1" opacity="0.3" stroke-linecap="round"/>
    <line x1="-26" y1="0" x2="-40" y2="0" stroke="#c084fc" stroke-width="1.5" opacity="0.35" stroke-linecap="round"/>
  </g>
</svg>