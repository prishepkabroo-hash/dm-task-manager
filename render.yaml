# Render Blueprint — БД теперь внешняя (Neon/Postgres), локальный диск не нужен.
# В Render Dashboard → Environment добавь переменную:
#   DATABASE_URL = postgresql://user:pass@host/neondb?sslmode=require
# (строку возьми в Neon → Connection Details)

services:
  - type: web
    name: dm-task-manager
    runtime: python
    plan: free
    buildCommand: "pip install -r requirements.txt"
    startCommand: "python server.py"
    autoDeploy: true
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.9
      # DATABASE_URL задаётся руками в Render Dashboard — в yaml его не храним,
      # чтобы строка с паролем не попала в git.
